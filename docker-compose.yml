services:
  db:
    image: postgres:16-alpine
    container_name: wbtracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wbuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wbpassword}
      POSTGRES_DB: ${POSTGRES_DB:-wb_tracker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wbuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: wbtracker_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-wb_tracker}
      DB_USER: ${POSTGRES_USER:-wbuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-wbpassword}
      DATABASE_URL: "postgresql://${POSTGRES_USER:-wbuser}:${POSTGRES_PASSWORD:-wbpassword}@db:5432/${POSTGRES_DB:-wb_tracker}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: wbtracker_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata: