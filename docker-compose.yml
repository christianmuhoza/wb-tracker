services:
  db:
    image: postgres:16-alpine
    container_name: wbtracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wbtracker}
    ports:
      - "5432:5432"   # remove this if you don't need host access to the DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: wbtracker_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-wbtracker}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # remove if only nginx should be reachable from outside
    # No bind mount here on purpose: backend/venv would otherwise get
    # mounted into the container and clash with the packages pip installs
    # inside the image. Rebuild the image after backend code changes:
    #   docker compose build backend && docker compose up -d backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: wbtracker_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
